<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Now & Next</title>

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#14171F" />

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Now & Next" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" href="icons/icon-192.png" />

<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');

  :root{
    --ink:#14171F; --panel:#1E2230; --panel2:#181B26; --cream:#F5EFE0;
    --muted:#8A8F9C; --amber:#E8A33D; --teal:#4FA8A0; --danger:#fca5a5;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--cream);
    font-family:'Inter',system-ui,sans-serif; -webkit-tap-highlight-color:transparent;
    height:100%; overscroll-behavior:none;}
  .display-font{font-family:'Archivo Black', Georgia, serif;}
  .mono{font-family:'JetBrains Mono', monospace;}
  button{font-family:inherit; cursor:pointer;}
  input,textarea{font-family:inherit;}

  #app{max-width:min(900px, 94vw);margin:0 auto;padding:clamp(14px,3vw,24px);min-height:100vh;
    display:flex;flex-direction:column;
    padding-top:calc(clamp(14px,3vw,24px) + env(safe-area-inset-top));
    padding-bottom:calc(clamp(14px,3vw,24px) + env(safe-area-inset-bottom));}

  .row{display:flex;align-items:center;justify-content:space-between;}
  .muted{color:var(--muted);}
  .eyebrow{font-size:clamp(10px,2.2vw,13px);letter-spacing:0.28em;text-transform:uppercase;font-weight:600;}

  .icon-btn{padding:12px;border-radius:999px;border:1px solid rgba(255,255,255,0.12);
    background:transparent;color:var(--muted);flex-shrink:0;}
  .icon-btn:hover{background:rgba(255,255,255,0.08);}

  /* NOW: smaller, secondary tile */
  .tile-now{border-radius:18px;border:1px solid rgba(232,163,61,0.35);
    padding:clamp(16px,3.5vw,26px); margin:14px 0 12px 0;
    min-height:clamp(120px,18vh,190px);
    display:flex;flex-direction:column;justify-content:center;
    background-color:var(--panel); background-size:cover; background-position:center;
    position:relative;}

  /* NEXT: bigger, emphasized tile */
  .tile-next{border-radius:18px;border:1px solid rgba(79,168,160,0.35);
    padding:clamp(22px,5vw,44px); flex:1;
    min-height:clamp(240px,46vh,520px);
    display:flex;flex-direction:column;justify-content:center;
    background-color:var(--panel2); background-size:cover; background-position:center;
    position:relative;}

  .subject-now{font-size:clamp(20px,5.2vw,34px);line-height:1.15;}
  .subject-next{font-size:clamp(30px,8.6vw,68px);line-height:1.1;}
  .time-now{font-size:clamp(12px,2.6vw,15px);}
  .time-next{font-size:clamp(14px,3.2vw,20px);}

  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
  .tag{display:inline-block;padding:3px 10px;border-radius:999px;font-size:clamp(10px,2.4vw,12px);font-weight:500;
    background:rgba(79,168,160,0.2);color:#c9f1ec;border:1px solid rgba(79,168,160,0.4);margin:3px 4px 0 0;
    backdrop-filter: blur(2px);}
  .tag-now{background:rgba(232,163,61,0.2);color:#ffdca8;border:1px solid rgba(232,163,61,0.4);}

  @keyframes flapIn{0%{transform:rotateX(-90deg);opacity:0;}55%{transform:rotateX(12deg);opacity:1;}100%{transform:rotateX(0);opacity:1;}}
  .flap{animation:flapIn .55s cubic-bezier(.2,.7,.3,1); transform-origin:top center; display:inline-block;}
  @media (prefers-reduced-motion: reduce){ .flap{animation:none;} }

  .daytabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;}
  .daytabs::-webkit-scrollbar{height:6px;}
  .daytabs::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:4px;}
  .daytab{flex:none;padding:9px 16px;border-radius:999px;font-size:14px;font-weight:600;border:1px solid rgba(255,255,255,0.08);background:var(--panel);color:var(--muted);}
  .daytab.active{background:var(--teal);color:#0E1116;border-color:transparent;}

  .lesson-row{width:100%;text-align:left;border-radius:14px;padding:14px 16px;margin-bottom:10px;
    background:var(--panel);border:1px solid rgba(255,255,255,0.08);color:inherit;
    background-size:cover;background-position:center;position:relative;overflow:hidden;}
  .lesson-row:hover{filter:brightness(1.1);}
  .lesson-row-inner{position:relative;z-index:1;}
  .lesson-row-scrim{position:absolute;inset:0;background:linear-gradient(90deg, rgba(20,23,31,0.88), rgba(20,23,31,0.55));z-index:0;}

  .empty{font-size:14px;background:var(--panel);color:var(--muted);border-radius:14px;padding:20px;text-align:center;}

  .add-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;border-radius:14px;
    padding:13px;font-size:14px;font-weight:600;background:rgba(232,163,61,0.15);color:var(--amber);
    border:1px dashed rgba(232,163,61,0.4);}

  .field-label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;}
  .field{width:100%;border-radius:10px;padding:9px 12px;font-size:14px;background:var(--ink);
    color:var(--cream);border:1px solid rgba(255,255,255,0.12);margin-bottom:14px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

  .btn-primary{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;border-radius:10px;
    padding:11px;font-size:14px;font-weight:600;background:var(--teal);color:#0E1116;border:none;}
  .btn-danger{padding:11px;border-radius:10px;background:rgba(220,38,38,0.15);color:var(--danger);border:none;font-size:13px;font-weight:600;}
  .btn-secondary{padding:11px;border-radius:10px;background:rgba(255,255,255,0.08);color:var(--cream);border:none;font-size:13px;font-weight:600;}

  .editor{background:var(--panel);border:1px solid rgba(79,168,160,0.3);border-radius:14px;padding:20px;margin-top:8px;}

  .banner-err{font-size:12px;padding:10px 12px;border-radius:10px;background:rgba(220,38,38,0.15);color:var(--danger);margin-bottom:14px;}

  .img-preview{width:100%;height:120px;border-radius:10px;background-size:cover;background-position:center;
    background-color:rgba(255,255,255,0.05);margin-bottom:10px;border:1px solid rgba(255,255,255,0.1);
    display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);}

  .file-btn-row{display:flex;gap:8px;margin-bottom:14px;}

  a{color:var(--teal);}

  @media (max-width:250px){
    .date-row{display:none;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const DAY_ABBR = {Monday:"Mon",Tuesday:"Tue",Wednesday:"Wed",Thursday:"Thu",Friday:"Fri",Saturday:"Sat",Sunday:"Sun"};
const STORAGE_KEY = "now-next-timetable-v1";

/* ---------- timetable storage (localStorage) ---------- */
function emptyTimetable(){ const t={}; DAYS.forEach(d=>t[d]=[]); return t; }
function loadTimetable(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return emptyTimetable();
    const parsed = JSON.parse(raw);
    const merged = emptyTimetable();
    DAYS.forEach(d=>{ if(Array.isArray(parsed[d])) merged[d]=parsed[d]; });
    return merged;
  }catch(e){ return emptyTimetable(); }
}
function saveTimetable(t){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(t)); return true; }
  catch(e){ return false; }
}

/* ---------- background image storage (IndexedDB, keyed by lesson id) ---------- */
const IDB_NAME = "nowNextImages";
const IDB_STORE = "images";
function openImageDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = ()=>{ req.result.createObjectStore(IDB_STORE); };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
}
async function idbPutImage(id, dataUrl){
  const db = await openImageDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(IDB_STORE,"readwrite");
    tx.objectStore(IDB_STORE).put(dataUrl, id);
    tx.oncomplete = ()=>resolve(true);
    tx.onerror = ()=>reject(tx.error);
  });
}
async function idbDeleteImage(id){
  const db = await openImageDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(IDB_STORE,"readwrite");
    tx.objectStore(IDB_STORE).delete(id);
    tx.oncomplete = ()=>resolve(true);
    tx.onerror = ()=>reject(tx.error);
  });
}
async function idbGetAllImages(){
  const db = await openImageDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(IDB_STORE,"readonly");
    const store = tx.objectStore(IDB_STORE);
    const result = {};
    const req = store.openCursor();
    req.onsuccess = (e)=>{
      const cursor = e.target.result;
      if(cursor){ result[cursor.key]=cursor.value; cursor.continue(); }
      else resolve(result);
    };
    req.onerror = ()=>reject(req.error);
  });
}
function compressImage(file, maxDim=1100, quality=0.72){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let {width,height} = img;
        if(width>height && width>maxDim){ height=Math.round(height*maxDim/width); width=maxDim; }
        else if(height>=width && height>maxDim){ width=Math.round(width*maxDim/height); height=maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width=width; canvas.height=height;
        canvas.getContext("2d").drawImage(img,0,0,width,height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = ()=>reject(new Error("Could not read image"));
      img.src = e.target.result;
    };
    reader.onerror = ()=>reject(new Error("Could not read file"));
    reader.readAsDataURL(file);
  });
}

let imageCache = {}; // lessonId -> dataUrl

/* ---------- helpers ---------- */
function toMinutes(hhmm){ if(!hhmm) return null; const [h,m]=hhmm.split(":").map(Number); return h*60+m; }
function fmtTime(hhmm){
  if(!hhmm) return "";
  const [h,m]=hhmm.split(":").map(Number);
  const ampm = h>=12 ? "PM":"AM";
  const h12 = h%12===0 ? 12 : h%12;
  return `${h12}:${String(m).padStart(2,"0")} ${ampm}`;
}
function dayNameFromDate(date){
  return ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][date.getDay()];
}
function sortLessons(lessons){ return [...lessons].sort((a,b)=>toMinutes(a.start)-toMinutes(b.start)); }

function findNowAndNext(timetable, now){
  const todayName = dayNameFromDate(now);
  const nowMin = now.getHours()*60+now.getMinutes();
  const today = sortLessons(timetable[todayName]||[]);

  let current=null;
  for(const l of today){
    const s=toMinutes(l.start), e=toMinutes(l.end);
    if(s!==null && e!==null && nowMin>=s && nowMin<e){ current=l; break; }
  }
  let next=null, nextDayLabel=null;
  for(const l of today){
    const s=toMinutes(l.start);
    if(s!==null && s>nowMin){ next=l; break; }
  }
  if(!next){
    const idx = DAYS.indexOf(todayName);
    for(let i=1;i<=7;i++){
      const d = DAYS[(idx+i)%7];
      const lessons = sortLessons(timetable[d]||[]);
      if(lessons.length>0){ next=lessons[0]; nextDayLabel = i===1 ? "Tomorrow" : d; break; }
    }
  }
  return {current, next, nextDayLabel};
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function studentTagsHtml(students, tagClass){
  if(!students || students.length===0) return `<span class="muted" style="font-size:13px;font-style:italic;">No students listed</span>`;
  return `<div style="margin-top:8px;">` + students.map(s=>`<span class="tag ${tagClass||''}">${escapeHtml(s)}</span>`).join("") + `</div>`;
}
function tileBgStyle(lessonId, baseColor){
  const img = lessonId ? imageCache[lessonId] : null;
  if(!img) return `background-color:${baseColor};`;
  return `background-image:linear-gradient(180deg, rgba(20,23,31,0.42), rgba(20,23,31,0.82)), url('${img}');`;
}

/* ---------- state ---------- */
let state = {
  view: "display",
  timetable: loadTimetable(),
  selectedDay: dayNameFromDate(new Date()),
  editingLesson: null,
  saveError: false,
};
function setState(patch){ state = {...state, ...patch}; render(); }
function persist(nextTimetable){
  const ok = saveTimetable(nextTimetable);
  setState({ timetable: nextTimetable, saveError: !ok });
}

/* ---------- render ---------- */
function render(){
  const app = document.getElementById("app");
  app.innerHTML = state.view === "display" ? renderDisplay() : renderConfig();
  attachHandlers();
}

function renderDisplay(){
  const now = new Date();
  const {current, next, nextDayLabel} = findNowAndNext(state.timetable, now);
  const dateStr = now.toLocaleDateString(undefined,{weekday:"long", month:"long", day:"numeric"});
  const timeStr = now.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:true});

  return `
    <div class="row date-row" style="margin-bottom:6px;">
      <div>
        <div class="eyebrow muted">${dateStr}</div>
        <div class="mono" style="font-size:clamp(18px,4.6vw,28px);font-weight:700;color:var(--cream);margin-top:4px;">${timeStr}</div>
      </div>
      <button class="icon-btn" id="openConfig" aria-label="Edit timetable">${gearSvg()}</button>
    </div>

    <div class="tile-now" style="${tileBgStyle(current && current.id, 'var(--panel)')}">
      <div class="row" style="justify-content:flex-start;gap:8px;margin-bottom:10px;">
        <span class="dot" style="background:var(--amber);box-shadow:0 0 8px var(--amber);"></span>
        <span class="eyebrow" style="color:var(--amber);">Now</span>
      </div>
      ${current ? `
        <div class="display-font flap subject-now">${escapeHtml(current.subject)}</div>
        <div class="mono muted time-now" style="margin-top:8px;">${fmtTime(current.start)} – ${fmtTime(current.end)}</div>
        <div style="margin-top:10px;display:flex;gap:8px;align-items:flex-start;">
          ${usersSvg("#ffdca8")}
          ${studentTagsHtml(current.students, "tag-now")}
        </div>
      ` : `
        <div class="display-font subject-now">Free right now</div>
        <div class="muted time-now" style="margin-top:6px;">Nothing scheduled at this moment.</div>
      `}
    </div>

    <div class="tile-next" style="${tileBgStyle(next && next.id, 'var(--panel2)')}">
      <div class="row" style="justify-content:flex-start;gap:8px;margin-bottom:14px;">
        <span class="dot" style="width:9px;height:9px;background:var(--teal);box-shadow:0 0 8px var(--teal);"></span>
        <span class="eyebrow" style="color:var(--teal);font-size:clamp(12px,2.6vw,15px);">Next${nextDayLabel ? " · "+nextDayLabel : ""}</span>
      </div>
      ${next ? `
        <div class="display-font flap subject-next">${escapeHtml(next.subject)}</div>
        <div class="mono muted time-next" style="margin-top:12px;">${fmtTime(next.start)} – ${fmtTime(next.end)}</div>
        ${(next.students && next.students.length>0) ? `<div style="margin-top:14px;display:flex;gap:8px;align-items:flex-start;">${usersSvg("#c9f1ec")}${studentTagsHtml(next.students)}</div>` : ``}
      ` : `<div class="muted" style="font-size:clamp(14px,3vw,18px);">Nothing else on the timetable this week.</div>`}
    </div>
  `;
}

function renderConfig(){
  const lessons = sortLessons(state.timetable[state.selectedDay]||[]);
  const editing = state.editingLesson;

  const dayTabs = DAYS.map(d => `
    <button class="daytab ${d===state.selectedDay?'active':''}" data-day="${d}">${DAY_ABBR[d]}</button>
  `).join("");

  const lessonRows = lessons.map(l => `
    <button class="lesson-row" data-editid="${l.id}" style="${tileBgStyle(l.id, 'var(--panel)')}">
      <div class="lesson-row-scrim"></div>
      <div class="lesson-row-inner">
        <div style="display:flex;align-items:center;gap:8px;">
          ${bookSvg()}
          <span style="font-weight:600;color:var(--cream);">${escapeHtml(l.subject)}</span>
        </div>
        <div class="mono muted" style="font-size:12px;margin-top:6px;">${fmtTime(l.start)} – ${fmtTime(l.end)}</div>
        ${l.students && l.students.length>0 ? `<div class="muted" style="font-size:12px;margin-top:4px;">${l.students.length} student${l.students.length!==1?'s':''}</div>` : ``}
      </div>
    </button>
  `).join("");

  const imgPreview = editing && editing.imageDataUrl
    ? `<div class="img-preview" style="background-image:url('${editing.imageDataUrl}');"></div>`
    : `<div class="img-preview">No picture set</div>`;

  const editorHtml = editing ? `
    <div class="editor">
      <div class="row" style="margin-bottom:14px;">
        <span class="eyebrow" style="color:var(--teal);">${editing.id ? "Edit lesson" : "New lesson"}</span>
        <button class="icon-btn" style="padding:6px;" id="closeEditor" aria-label="Close">${xSvg()}</button>
      </div>

      <label class="field-label">Subject</label>
      <input class="field" id="f-subject" type="text" value="${escapeHtml(editing.subject)}" placeholder="e.g. Year 9 Mathematics" />

      <div class="grid2">
        <div>
          <label class="field-label">Start time</label>
          <input class="field mono" id="f-start" type="time" value="${editing.start}" />
        </div>
        <div>
          <label class="field-label">End time</label>
          <input class="field mono" id="f-end" type="time" value="${editing.end}" />
        </div>
      </div>

      <label class="field-label">Students <span style="opacity:0.6;">(comma separated)</span></label>
      <textarea class="field" id="f-students" rows="2" placeholder="e.g. Amara, Leo, Priya, Tom">${escapeHtml(editing.studentsText)}</textarea>

      <label class="field-label">Background picture <span style="opacity:0.6;">(optional)</span></label>
      ${imgPreview}
      <div class="file-btn-row">
        <input type="file" accept="image/*" id="f-image" style="display:none;" />
        <button class="btn-secondary" id="pickImage" type="button">${imageSvg()} ${editing.imageDataUrl ? "Change picture" : "Choose picture"}</button>
        ${editing.imageDataUrl ? `<button class="btn-danger" id="removeImage" type="button">Remove</button>` : ``}
      </div>
      ${editing.imageLoading ? `<div class="muted" style="font-size:12px;margin-top:-8px;margin-bottom:12px;">Processing image…</div>` : ``}

      <div style="display:flex;gap:8px;">
        <button class="btn-primary" id="saveLesson">${checkSvg()} Save</button>
        ${editing.id ? `<button class="btn-danger" id="deleteLesson" aria-label="Delete">${trashSvg()}</button>` : ``}
      </div>
    </div>
  ` : "";

  return `
    <div class="row" style="margin-bottom:20px;">
      <button class="icon-btn" id="backToDisplay" style="border:none;display:flex;align-items:center;gap:4px;color:var(--cream);font-size:14px;font-weight:600;padding:8px 10px;">
        ${chevronLeftSvg()} Done
      </button>
      <span class="eyebrow muted">Timetable</span>
    </div>

    ${state.saveError ? `<div class="banner-err">Couldn't save changes — your browser storage may be full or blocked.</div>` : ""}

    <div class="daytabs">${dayTabs}</div>

    <div style="margin-bottom:16px;">
      ${lessons.length===0 && !editing ? `<div class="empty">No lessons yet for ${state.selectedDay}. Add the first one below.</div>` : lessonRows}
    </div>

    ${!editing ? `<button class="add-btn" id="addLesson">${plusSvg()} Add lesson to ${DAY_ABBR[state.selectedDay]}</button>` : ""}

    ${editorHtml}
  `;
}

/* ---------- event wiring ---------- */
function attachHandlers(){
  if(state.view==="display"){
    const btn = document.getElementById("openConfig");
    if(btn) btn.onclick = () => setState({view:"config", selectedDay: dayNameFromDate(new Date())});
    return;
  }
  const back = document.getElementById("backToDisplay");
  if(back) back.onclick = () => setState({view:"display", editingLesson:null});

  document.querySelectorAll(".daytab").forEach(tab=>{
    tab.onclick = () => setState({selectedDay: tab.dataset.day, editingLesson:null});
  });

  document.querySelectorAll(".lesson-row").forEach(row=>{
    row.onclick = () => {
      const id = row.dataset.editid;
      const lesson = (state.timetable[state.selectedDay]||[]).find(l=>l.id===id);
      if(lesson) setState({editingLesson:{
        id:lesson.id, start:lesson.start, end:lesson.end, subject:lesson.subject,
        studentsText:(lesson.students||[]).join(", "),
        imageDataUrl: imageCache[lesson.id] || null,
        removeImage:false, imageLoading:false
      }});
    };
  });

  const addBtn = document.getElementById("addLesson");
  if(addBtn) addBtn.onclick = () => setState({editingLesson:{
    id:null, start:"09:00", end:"10:00", subject:"", studentsText:"",
    imageDataUrl:null, removeImage:false, imageLoading:false
  }});

  const closeBtn = document.getElementById("closeEditor");
  if(closeBtn) closeBtn.onclick = () => setState({editingLesson:null});

  const pickImgBtn = document.getElementById("pickImage");
  const fileInput = document.getElementById("f-image");
  if(pickImgBtn && fileInput){
    pickImgBtn.onclick = () => fileInput.click();
    fileInput.onchange = async () => {
      const file = fileInput.files && fileInput.files[0];
      if(!file) return;
      setState({editingLesson:{...state.editingLesson, imageLoading:true}});
      try{
        const dataUrl = await compressImage(file);
        setState({editingLesson:{...state.editingLesson, imageDataUrl:dataUrl, removeImage:false, imageLoading:false}});
      }catch(e){
        setState({editingLesson:{...state.editingLesson, imageLoading:false}});
      }
    };
  }
  const removeImgBtn = document.getElementById("removeImage");
  if(removeImgBtn) removeImgBtn.onclick = () => {
    setState({editingLesson:{...state.editingLesson, imageDataUrl:null, removeImage:true}});
  };

  const saveBtn = document.getElementById("saveLesson");
  if(saveBtn) saveBtn.onclick = async () => {
    const subject = document.getElementById("f-subject").value.trim() || "Untitled lesson";
    const start = document.getElementById("f-start").value || "09:00";
    const end = document.getElementById("f-end").value || "10:00";
    const studentsText = document.getElementById("f-students").value;
    const students = studentsText.split(",").map(s=>s.trim()).filter(Boolean);
    const id = state.editingLesson.id || ("l-"+Date.now()+"-"+Math.round(Math.random()*9999));
    const lessonData = {id, start, end, subject, students};
    const dayLessons = state.timetable[state.selectedDay]||[];
    const exists = dayLessons.some(l=>l.id===id);
    const nextDay = exists ? dayLessons.map(l=>l.id===id?lessonData:l) : [...dayLessons, lessonData];

    if(state.editingLesson.imageDataUrl){
      try{ await idbPutImage(id, state.editingLesson.imageDataUrl); imageCache[id] = state.editingLesson.imageDataUrl; }catch(e){}
    } else if(state.editingLesson.removeImage){
      try{ await idbDeleteImage(id); delete imageCache[id]; }catch(e){}
    }

    persist({...state.timetable, [state.selectedDay]: nextDay});
    setState({editingLesson:null});
  };

  const delBtn = document.getElementById("deleteLesson");
  if(delBtn) delBtn.onclick = async () => {
    const id = state.editingLesson.id;
    const nextDay = (state.timetable[state.selectedDay]||[]).filter(l=>l.id!==id);
    try{ await idbDeleteImage(id); delete imageCache[id]; }catch(e){}
    persist({...state.timetable, [state.selectedDay]: nextDay});
    setState({editingLesson:null});
  };
}

  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("service-worker.js").catch(()=>{});
